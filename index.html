<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霾都狂徒 - 废土档案库</title>
    <style>
        :root {
            /* 霾都狂徒风格色板 */
            --pf-深红: #8b3a3a; /* 铁锈红 */
            --pf-古金: #cd7f32; /* 脏黄铜/青铜 */
            --pf-纸张: #e0d8c8; /* 泛黄的工业纸张 */
            --pf-边框: #2f2f2f; /* 枪械黑铁 */
            --pf-文本: #1a1a1a; /* 煤烟黑 */
            --pf-警告红: #ff4500; /* 熔炉火光橙 */
            --pf-高亮: #daa520;
        }

        /* === 动画定义 === */
        @keyframes 纸张展开 {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes 呼吸光 {
            0% { box-shadow: 0 0 50px rgba(0,0,0,0.9); }
            50% { box-shadow: 0 0 70px rgba(205, 127, 50, 0.15); } /* 黄铜色呼吸 */
            100% { box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        }

        @keyframes 弹窗进入 {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes 紧急呼吸 {
            0% { transform: scale(1); box-shadow: 0 0 5px var(--pf-警告红); border-color: var(--pf-警告红); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px var(--pf-警告红), inset 0 0 10px #ffcc00; }
            100% { transform: scale(1); box-shadow: 0 0 5px var(--pf-警告红); border-color: var(--pf-警告红); }
        }

        @keyframes 背景暗流 {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes 尘埃漂浮 {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(40px) rotate(45deg); opacity: 0; }
        }

        body {
            background-color: #0a0a0a;
            background-image: 
                url('https://www.transparenttextures.com/patterns/black-scales.png'),
                radial-gradient(circle at 50% 50%, rgba(50, 30, 20, 0.4), rgba(0, 0, 0, 0.95));
            background-attachment: fixed, fixed;
            background-size: auto, 200% 200%;
            animation: 背景暗流 20s ease infinite;
            color: var(--pf-文本);
            font-family: "Source Han Serif SC", "Songti SC", "Courier New", serif;
            margin: 0; padding: 30px 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        #特效层 {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; overflow: hidden;
        }

        .奥术尘埃 {
            position: absolute;
            background: #ffcc00;
            border-radius: 2px;
            box-shadow: 0 0 6px #ff4500;
        }

        .档案容器 {
            width: 100%; max-width: 1250px;
            background-color: var(--pf-纸张);
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(0,0,0,0.1)), url('https://www.transparenttextures.com/patterns/aged-paper.png');
            border: 8px solid var(--pf-边框);
            border-top: 15px solid var(--pf-边框);
            padding: 30px;
            position: relative;
            animation: 呼吸光 5s infinite ease-in-out, 纸张展开 0.8s ease-out;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        header {
            text-align: center;
            border-bottom: 4px solid var(--pf-边框);
            margin-bottom: 25px; padding-bottom: 15px;
            transition: border-color 0.5s;
        }
        header:hover { border-bottom-color: var(--pf-深红); }

        h1 { 
            color: var(--pf-文本); font-size: 2.8em; margin: 0; letter-spacing: 0.1em; 
            text-transform: uppercase;
            text-shadow: 2px 2px 0px rgba(184, 134, 11, 0.3);
            font-family: "Impact", "Source Han Serif SC", serif;
        }
        .副标题 { color: var(--pf-深红); font-size: 1.1em; font-weight: bold; margin-top: 5px; letter-spacing: 0.2em; text-transform: uppercase; }

        #状态栏 { 
            font-size: 0.85em; color: var(--pf-边框); margin-bottom: 15px; 
            text-align: center; font-style: italic; height: 1.2em;
            transition: opacity 0.3s; font-family: "Courier New", monospace;
        }

        .控制台 { 
            margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; 
            position: sticky; top: 0; z-index: 100; background: inherit; padding: 10px 0;
            backdrop-filter: blur(2px); align-items: center; border-bottom: 1px dashed var(--pf-古金);
        }

        .按钮 {
            background: #3e2723;
            color: #d7ccc8; 
            border: 2px solid var(--pf-古金);
            padding: 8px 16px; cursor: pointer; font-weight: bold; 
            display: flex; align-items: center; gap: 5px;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            font-family: "Courier New", sans-serif;
            text-transform: uppercase;
        }
        .按钮:hover { 
            background: var(--pf-古金); color: #000; 
            border-color: #000;
            transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.6);
        }

        .同步按钮 { background: #1b3320; border-color: #2e7d32; }
        .同步按钮:hover { background: #2e7d32; color: white; }
        
        .按钮-未保存 {
            background: #8b0000 !important;
            border-color: var(--pf-警告红) !important;
            color: #fff !important;
            animation: 紧急呼吸 1s infinite ease-in-out !important;
        }
        
        .按钮-模式 { background: #1a1a1a; border-color: #444; color: #888; }
        body.编辑模式 .按钮-模式 { background: var(--pf-古金); border-color: #000; color: #000; }

        .管理员组 { display: none; gap: 10px; align-items: center; }
        body.编辑模式 .管理员组 { display: flex; }

        .表格包装层 { overflow-x: auto; border: 2px solid var(--pf-边框); box-shadow: inset 0 0 20px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; background-color: rgba(255,255,255,0.1); }
        
        thead { background-color: var(--pf-边框); color: var(--pf-古金); }
        th { padding: 12px; text-align: left; border: 1px solid #444; font-size: 0.9em; letter-spacing: 1px; }
        
        td { 
            padding: 10px; border: 1px solid #9e8c76; vertical-align: middle; font-size: 0.9em; 
            color: #2c241e;
            transition: background-color 0.3s;
        }

        tr:hover td { background-color: rgba(205, 127, 50, 0.1); }
        .行进入 { animation: 纸张展开 0.5s ease-out backwards; }

        .立绘框 { 
            width: 65px; height: 80px; 
            border: 2px solid var(--pf-边框); 
            outline: 1px solid var(--pf-古金);
            outline-offset: -4px;
            overflow: hidden; cursor: zoom-in; margin: 0 auto; 
            position: relative; background: #111;
            transition: transform 0.3s, box-shadow 0.3s;
            filter: sepia(0.2);
        }
        .立绘框 img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        
        .姓名格 { font-weight: bold; color: #6d2416; font-family: "Impact", sans-serif; }
        
        body.编辑模式 [contenteditable="true"]:focus { 
            background: #fff; outline: none;
            box-shadow: 0 0 0 2px var(--pf-古金); color: #000;
        }

        .管理列 { display: none; }
        body.编辑模式 .管理列 { display: table-cell; }

        .管理格 { display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .小方钮 { 
            padding: 2px 6px; cursor: pointer; background: #5d4037; 
            color: white; border: 1px solid #3e2723; font-size: 10px;
        }

        .弹窗遮罩 {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
            backdrop-filter: blur(3px);
        }

        .面板 {
            background: var(--pf-纸张); border: 4px double var(--pf-边框);
            padding: 30px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            animation: 弹窗进入 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 专有名词文本框样式 */
        #名词输入区 {
            width: 100%; height: 350px;
            background: #1a1a1a;
            color: #daa520; /* 固定古金色 */
            font-size: 16px; /* 固定16px */
            font-family: "Source Han Serif SC", "Courier New", serif;
            padding: 15px;
            border: 2px solid var(--pf-古金);
            box-sizing: border-box;
            resize: none;
            line-height: 1.6;
            outline: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .网址输入 {
            width: 90%; padding: 8px; background: #f0f0f0; border: 1px solid #888;
            color: #333; margin-bottom: 10px;
        }

        #放大预览 img { 
            max-width: 85%; max-height: 85%; border: 4px solid var(--pf-古金); 
            box-shadow: 0 0 50px #000; animation: 弹窗进入 0.3s ease-out;
        }

        .瑟希隆符号 { 
            text-align: center; margin-top: 30px; color: var(--pf-古金); 
            font-size: 1.5em; opacity: 0.6; letter-spacing: 15px;
        }
    </style>
</head>
<body>

    <div id="特效层"></div>

    <div class="档案容器">
        <header>
            <h1>霾都狂徒</h1>
            <div class="副标题">阿肯斯塔通缉要犯与线人</div>
        </header>

        <div id="状态栏">齿轮运转正常，法力废墟读数稳定。</div>

        <div class="控制台">
            <button class="按钮 按钮-模式" onclick="切换模式()" id="模式按钮">✎ 编辑模式</button>
            <button class="按钮" onclick="加载数据()">🔄 刷新情报</button>
            <button class="按钮" style="background:#3e2723" onclick="导出备份()">导出胶卷</button>

            <div class="管理员组">
                <div style="width:2px; height:30px; background:var(--pf-边框); opacity:0.3; margin:0 5px;"></div>
                <button class="按钮" onclick="添加行()">+ 新增档案</button>
                <button class="按钮" onclick="打开名词弹窗()" style="background:#5d4037;">📜 专有名词</button>
                <button class="按钮 同步按钮" id="保存按钮" onclick="保存到云端()">● 刻录至机枢 (同步)</button>
                <button class="按钮" style="background:#3e2723" onclick="触发导入()">导入</button>
            </div>
            
            <input type="file" id="导入框" style="display:none" accept=".json" onchange="导入备份(event)">
        </div>

        <div class="表格包装层">
            <table>
                <thead>
                    <tr>
                        <th width="80">影像</th>
                        <th width="150">代号/姓名</th>
                        <th width="160">身份/职业</th>
                        <th width="200">动机/悬赏</th>
                        <th>情报记录</th>
                        <th width="120" class="管理列">操作</th>
                    </tr>
                </thead>
                <tbody id="表格主体"></tbody>
            </table>
        </div>
        <div id="页尾锚点"></div>
        <div class="瑟希隆符号">⚙ ⚙ ⚙ ⚙ ⚙</div>
    </div>

    <div id="放大预览" class="弹窗遮罩" onclick="this.style.display='none'">
        <img id="预览图" src="">
    </div>

    <div id="名词弹窗" class="弹窗遮罩">
        <div class="面板" style="width: 700px; max-width: 90%;">
            <h3 style="margin-top:0; font-family:Impact;">废土术语与名词记录</h3>
            <textarea id="名词输入区" placeholder="在此记录大公国的专有名词、地理位置或机密术语..."></textarea>
            <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
                <button class="按钮" onclick="确认保存名词()">确认暂存</button>
                <button class="按钮" style="border-color:#555; background:#666;" onclick="关闭名词弹窗()">取消</button>
            </div>
        </div>
    </div>

    <div id="更图弹窗" class="弹窗遮罩">
        <div class="面板" style="width:400px;">
            <h3>更新通缉令影像</h3>
            <p style="font-size: 0.8em; color: #5d4037;">粘贴影像或上传胶卷</p>
            <div style="border: 2px dashed var(--pf-边框); padding: 20px; margin: 15px 0; background: rgba(0,0,0,0.05);">
                <button class="按钮" style="font-size: 0.8em; margin: 0 auto;" onclick="document.getElementById('隐藏上传').click()">选择本地胶卷</button>
            </div>
            <input type="text" id="网址输入框" class="网址输入" placeholder="或输入影像链接...">
            <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
                <button class="按钮" onclick="确定网址()">确定</button>
                <button class="按钮" style="border-color:#555; background:#666;" onclick="关闭更图弹窗()">取消</button>
            </div>
        </div>
    </div>

    <input type="file" id="隐藏上传" style="display:none" accept="image/*">

    <script>
        const BIN_ID = '69474b2143b1c97be9fbf27e';
        const API_KEY = '$2a$10$HCO6T/SodpbU9GwiCzOV2uvw75u5tfxjQ5vdK3rvhmJiWdFsUxqTu';
        const IMG_BB_KEY = '192ec7a9ecdec9b51ffed683da3842dc';
        const 密码 = '781674';

        let 内存数据 = [];
        let 专有名词内容 = "";
        let 当前编辑索引 = -1;
        let 是否编辑模式 = false; 
        let 有未保存变更 = false;

        window.onload = function() {
            加载数据();
            初始化奥术尘埃();
        };

        function 切换模式() {
            if (!是否编辑模式) {
                const p = prompt("请输入鼠令以解锁档案:");
                if (p === 密码) {
                    是否编辑模式 = true;
                    document.body.classList.add('编辑模式');
                    document.getElementById('模式按钮').innerHTML = "👁 观察模式";
                    更新状态("权限验证通过。");
                    渲染表格();
                } else { alert("密令错误！"); }
            } else {
                if (有未保存变更 && !confirm("有未同步的数据，确定退出吗？")) return;
                是否编辑模式 = false;
                document.body.classList.remove('编辑模式');
                document.getElementById('模式按钮').innerHTML = "✎ 编辑模式";
                渲染表格();
            }
        }

        function 设置未保存状态(状态) {
            有未保存变更 = 状态;
            const btn = document.getElementById('保存按钮');
            if (状态) {
                btn.classList.add('按钮-未保存');
                btn.innerHTML = "⚠ 变更未刻录";
                document.title = "* 未保存 - 霾都档案";
            } else {
                btn.classList.remove('按钮-未保存');
                btn.innerHTML = "● 刻录至机枢 (同步)";
                document.title = "霾都狂徒 - 废土档案库";
            }
        }

        async function 加载数据() {
            更新状态("正在接入发条数据塔...");
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY, 'X-Bin-Meta': false }
                });
                const raw = await res.json();
                
                // 兼容旧版纯数组格式
                const data = raw.record || raw;
                if (data.npcs) {
                    内存数据 = data.npcs;
                    专有名词内容 = data.terms || "";
                } else {
                    内存数据 = Array.isArray(data) ? data : [];
                    专有名词内容 = "";
                }
                
                渲染表格();
                设置未保存状态(false);
                更新状态("档案已更新。");
            } catch (e) { 更新状态("连接中断。"); }
        }

        function 渲染表格() {
            const tbody = document.getElementById("表格主体");
            tbody.innerHTML = '';
            const editableAttr = 是否编辑模式 ? 'contenteditable="true"' : '';

            内存数据.forEach((npc, index) => {
                const tr = document.createElement('tr');
                tr.className = '行进入';
                tr.innerHTML = `
                    <td><div class="立绘框" onclick="预览图片('${npc.立绘}')"><img src="${npc.立绘}"></div></td>
                    <td ${editableAttr} onblur="同步内存(${index}, '姓名', this.innerText)" class="姓名格">${npc.姓名}</td>
                    <td ${editableAttr} onblur="同步内存(${index}, '职位', this.innerText)">${npc.职位}</td>
                    <td ${editableAttr} onblur="同步内存(${index}, '动机', this.innerText)">${npc.动机}</td>
                    <td ${editableAttr} onblur="同步内存(${index}, '备注', this.innerText)">${npc.备注}</td>
                    <td class="管理列">
                        <div class="管理格">
                            <div style="display:flex; gap:3px;">
                                <button class="小方钮" onclick="移动位次(${index}, -1)">▲</button>
                                <button class="小方钮" onclick="移动位次(${index}, 1)">▼</button>
                            </div>
                            <div style="display:flex; gap:5px; width:100%;">
                                <button class="按钮" style="padding:2px 6px; font-size:11px; flex:1;" onclick="打开更图弹窗(${index})">更图</button>
                                <button class="按钮" style="padding:2px 6px; font-size:11px; background:#444; flex:1;" onclick="删除NPC(${index})">抹除</button>
                            </div>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function 同步内存(idx, key, val) {
            if (内存数据[idx][key] !== val.trim()) {
                内存数据[idx][key] = val.trim();
                设置未保存状态(true);
            }
        }

        function 添加行() {
            内存数据.push({ 立绘: 'https://i.ibb.co/mFr8QwJm/image.png', 姓名: '未知目标', 职位: '不明', 动机: '待查', 备注: '...' });
            渲染表格();
            设置未保存状态(true);
        }

        function 删除NPC(idx) {
            if (confirm("确定抹除？") && prompt("确认密码:") === 密码) {
                内存数据.splice(idx, 1);
                渲染表格();
                设置未保存状态(true);
            }
        }

        function 移动位次(index, step) {
            const newIndex = index + step;
            if (newIndex >= 0 && newIndex < 内存数据.length) {
                [内存数据[index], 内存数据[newIndex]] = [内存数据[newIndex], 内存数据[index]];
                渲染表格();
                设置未保存状态(true);
            }
        }

        // --- 专有名词逻辑 ---
        function 打开名词弹窗() {
            document.getElementById('名词输入区').value = 专有名词内容;
            document.getElementById('名词弹窗').style.display = 'flex';
        }

        function 关闭名词弹窗() {
            document.getElementById('名词弹窗').style.display = 'none';
        }

        function 确认保存名词() {
            const val = document.getElementById('名词输入区').value;
            if (专有名词内容 !== val) {
                专有名词内容 = val;
                设置未保存状态(true);
            }
            关闭名词弹窗();
        }

        async function 保存到云端() {
            if (prompt("刻录密令:") !== 密码) return;
            更新状态("正在上传...");
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify({ npcs: 内存数据, terms: 专有名词内容 })
                });
                设置未保存状态(false);
                更新状态("刻录成功！");
            } catch (e) { alert("同步失败"); }
        }

        // --- 影像处理 ---
        function 打开更图弹窗(index) { 当前编辑索引 = index; document.getElementById('更图弹窗').style.display = 'flex'; }
        function 关闭更图弹窗() { document.getElementById('更图弹窗').style.display = 'none'; }
        function 确定网址() {
            const url = document.getElementById('网址输入框').value.trim();
            if (url) { 内存数据[当前编辑索引].立绘 = url; 渲染表格(); 设置未保存状态(true); 关闭更图弹窗(); }
        }

        async function 执行上传(file) {
            if (!file) return;
            关闭更图弹窗();
            更新状态("影像显影中...");
            try {
                const formData = new FormData();
                formData.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMG_BB_KEY}`, { method: "POST", body: formData });
                const result = await res.json();
                if (result.success) {
                    内存数据[当前编辑索引].立绘 = result.data.url;
                    渲染表格();
                    设置未保存状态(true);
                    更新状态("影像就绪。");
                }
            } catch (err) { alert("显影失败"); }
        }

        document.getElementById('隐藏上传').onchange = (e) => 执行上传(e.target.files[0]);

        document.addEventListener('paste', (e) => {
            if (document.getElementById('更图弹窗').style.display === 'flex') {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let item of items) { if (item.type.indexOf("image") !== -1) 执行上传(item.getAsFile()); }
            }
        });

        function 预览图片(s) { document.getElementById("预览图").src = s; document.getElementById("放大预览").style.display = 'flex'; }
        function 更新状态(s) { document.getElementById("状态栏").innerText = s; }

        function 导出备份() {
            const blob = new Blob([JSON.stringify({ npcs: 内存数据, terms: 专有名词内容 }, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `霾都备份_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        function 触发导入() { document.getElementById("导入框").click(); }
        function 导入备份(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = JSON.parse(ev.target.result);
                if (data.npcs) { 内存数据 = data.npcs; 专有名词内容 = data.terms; } else { 内存数据 = data; }
                渲染表格(); 设置未保存状态(true);
            };
            reader.readAsText(e.target.files[0]);
        }

        function 初始化奥术尘埃() {
            const layer = document.getElementById('特效层');
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.classList.add('奥术尘埃');
                const size = Math.random() * 4 + 1;
                p.style.width = p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.animation = `尘埃漂浮 ${Math.random()*5+3}s linear ${Math.random()*5}s infinite`;
                layer.appendChild(p);
            }
        }
    </script>
</body>
</html>
